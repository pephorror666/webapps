<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Notter | IARANN</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Silkscreen&display=swap" rel="stylesheet">
    <style>
        /* Variables de diseño */
        :root {
            --primary-color: #1DA1F2;
            --primary-hover: #1a91da;
            --bg-color: #f7f9f9;
            --card-bg: #ffffff;
            --text-main: #0f1419;
            --text-muted: #536471;
            --border-color: #eff3f4;
            --radius: 30px;
            --card-radius: 12px;
            --glass-blur: 0px;
            --font-main: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            --sidebar-z: 100;
        }

        body.theme-dark {
            --bg-color: #111827;
            --card-bg: #1f2937;
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --border-color: #374151;
            --primary-color: #3b82f6;
            --primary-hover: #60a5fa;
        }

        body.theme-macos {
            --bg-color: #f5f5f7;
            --card-bg: rgba(255, 255, 255, 0.6);
            --text-main: #1d1d1f;
            --text-muted: #86868b;
            --border-color: rgba(0, 0, 0, 0.05);
            --primary-color: #0071e3;
            --primary-hover: #0077ed;
            --glass-blur: 20px;
            --card-radius: 16px;
            background-image: radial-gradient(circle at 20% 20%, #e3e3e3 0%, transparent 40%),
                radial-gradient(circle at 80% 80%, #d2d2d2 0%, transparent 40%);
        }

        body.theme-pixel {
            --bg-color: #000;
            --card-bg: #000;
            --text-main: #00ff00;
            --text-muted: #008f11;
            --border-color: #00ff00;
            --primary-color: #ffff00;
            --primary-hover: #ffffff;
            --font-main: 'Silkscreen', cursive;
            --radius: 0px;
            --card-radius: 0px;
        }

        body.theme-nature {
            --bg-color: #f1f8e9;
            --card-bg: #ffffff;
            --text-main: #2e7d32;
            --text-muted: #689f38;
            --border-color: rgba(46, 125, 50, 0.2);
            --primary-color: #1b5e20;
            --primary-hover: #388e3c;
        }

        body.theme-pride {
            --bg-color: #fff;
            --card-bg: #fff;
            --text-main: #2d3436;
            --text-muted: #636e72;
            --border-color: #dfe6e9;
            --primary-color: #d63031;
            --primary-hover: #e17055;
            --rainbow-border: linear-gradient(90deg, #FF0018, #FFA52C, #FFFF41, #008018, #0000F9, #86007D);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: var(--font-main);
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            transition: background 0.3s, color 0.3s;
        }

        /* Barra superior */
        .top-bar {
            position: sticky;
            top: 0;
            background-color: var(--card-bg);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 20px;
            border-bottom: 1px solid var(--border-color);
            z-index: 1000;
            backdrop-filter: blur(var(--glass-blur));
        }

        body.theme-pride .top-bar {
            border-bottom: 4px solid;
            border-image: var(--rainbow-border) 1;
        }

        .top-bar-left {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .menu-btn {
            display: none;
            background: none;
            border: none;
            color: var(--primary-color);
            font-size: 1.5rem;
            cursor: pointer;
            padding: 5px;
        }

        .theme-selector {
            padding: 5px 10px;
            border-radius: var(--radius);
            border: 1px solid var(--border-color);
            background: var(--bg-color);
            color: var(--text-main);
            font-size: 0.8rem;
            outline: none;
            cursor: pointer;
        }

        .logo {
            font-size: 1.2rem;
            font-weight: bold;
            color: var(--primary-color);
            text-decoration: none;
        }

        .search-container input {
            padding: 10px 15px;
            border-radius: 20px;
            border: 1px solid var(--border-color);
            background-color: rgba(0,0,0,0.05);
            width: 300px;
            font-size: 0.9rem;
            outline: none;
            transition: background-color 0.2s;
            color: var(--text-main);
        }

        .search-container input:focus {
            background-color: var(--card-bg);
            border-color: var(--primary-color);
        }

        .top-right-hint {
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        /* Layout principal */
        .layout {
            display: flex;
            max-width: 1000px;
            margin: 0 auto;
            padding-top: 10px;
        }

        /* Menú lateral */
        .sidebar {
            width: 250px;
            padding: 20px 10px;
            position: sticky;
            top: 60px;
            height: calc(100vh - 60px);
            background-color: var(--bg-color);
            transition: transform 0.3s ease;
            z-index: var(--sidebar-z);
        }

        .sidebar ul {
            list-style: none;
        }

        .sidebar li {
            padding: 12px 20px;
            margin-bottom: 5px;
            border-radius: var(--radius);
            cursor: pointer;
            font-size: 1.1rem;
            transition: background-color 0.2s, color 0.2s;
            display: flex;
            align-items: center;
        }

        .sidebar li:hover {
            background-color: var(--border-color);
            color: var(--primary-color);
        }

        .sidebar li.active {
            font-weight: bold;
            color: var(--primary-color);
        }

        .sidebar-footer {
            margin-top: 15px;
            padding: 10px;
        }

        /* Puntito de color de cada sección */
        .section-color-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            margin-right: 8px;
            border: 1px solid #ccc;
            flex-shrink: 0;
        }

        /* Feed central */
        .feed {
            flex: 1;
            border-left: 1px solid var(--border-color);
            border-right: 1px solid var(--border-color);
            min-height: 100vh;
            background-color: var(--card-bg);
        }

        #feed-header {
            padding: 15px 20px;
            border-bottom: 1px solid var(--border-color);
            background-color: var(--card-bg);
            backdrop-filter: blur(var(--glass-blur));
            position: sticky;
            top: 55px;
            z-index: 90;
        }

        /* Tarjetas de notas */
        .note-card {
            padding: 16px 20px;
            border-bottom: 1px solid var(--border-color);
            transition: background-color 0.2s, box-shadow 0.2s, transform 0.1s;
            border-radius: var(--card-radius);
            border: 2px solid var(--border-color);
            /* Se sobreescribe con el color de la sección */
            margin: 8px 12px;
            background-color: var(--card-bg);
            backdrop-filter: blur(var(--glass-blur));
        }

        body.theme-pixel .note-card {
            border-width: 4px;
        }

        .note-card:hover {
            filter: brightness(0.98);
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.06);
            transform: translateY(-1px);
        }

        /* Estado fijado */
        .note-card.pinned {
            background-color: rgba(250, 204, 21, 0.1);
            box-shadow: 0 0 0 1px #facc15;
        }

        .note-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
        }

        .note-area-tag {
            font-size: 0.8rem;
            background-color: var(--primary-color);
            color: white;
            padding: 2px 8px;
            border-radius: 10px;
            font-weight: bold;
        }

        .note-date {
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        .note-title {
            font-size: 1.1rem;
            margin-bottom: 5px;
        }

        .note-desc {
            color: var(--text-muted);
            line-height: 1.5;
            white-space: pre-wrap;
        }

        .note-meta-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 8px;
        }

        .pin-badge {
            font-size: 0.8rem;
            color: #92400e;
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }

        /* Botón flotante (FAB) */
        #fab-add {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 50%;
            width: 60px;
            height: 60px;
            font-size: 30px;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
            transition: transform 0.2s, background-color 0.2s;
            z-index: 150;
        }

        body.theme-pixel #fab-add {
            border: 4px solid var(--primary-color);
            border-radius: 0;
        }

        #fab-add:hover {
            background-color: var(--primary-hover);
            transform: scale(1.05);
        }

        /* Modal (Pop-up) */
        .hidden {
            display: none !important;
        }

        #modal-overlay,
        #section-modal-overlay,
        #confirm-modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(0, 0, 0, 0.5);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2000;
        }

        .modal-card {
            background-color: var(--card-bg);
            width: 100%;
            max-width: 500px;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            color: var(--text-main);
        }

        .modal-card h3 {
            margin-bottom: 20px;
            font-size: 1.3rem;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 10px;
        }

        .form-group {
            margin-bottom: 15px;
            display: flex;
            flex-direction: column;
        }

        .form-group label {
            margin-bottom: 5px;
            font-weight: bold;
            font-size: 0.9rem;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            padding: 10px;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            font-size: 1rem;
            background: var(--bg-color);
            color: var(--text-main);
        }

        .modal-actions {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-top: 20px;
        }

        button {
            cursor: pointer;
        }

        .btn-secondary {
            background-color: transparent;
            border: 1px solid var(--border-color);
            padding: 10px 20px;
            border-radius: var(--radius);
            font-weight: bold;
            color: var(--text-main);
        }

        .btn-primary {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: var(--radius);
            font-weight: bold;
        }

        .btn-primary:hover {
            background-color: var(--primary-hover);
        }

        .btn-full-width {
            width: 100%;
            text-align: center;
        }

        /* Acciones de la nota */
        .note-actions {
            margin-top: 10px;
            display: flex;
            gap: 15px;
            justify-content: flex-end;
        }

        .note-actions button {
            background: none;
            border: none;
            color: var(--primary-color);
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 500;
        }

        .note-actions button.delete-btn {
            color: #f4212e;
        }

        .note-actions button:hover {
            text-decoration: underline;
        }

        /* Enlaces dentro de la descripción */
        .note-desc a {
            color: var(--primary-color);
            text-decoration: underline;
            word-break: break-all;
        }

        /* Responsivo básico */
        @media (max-width: 900px) {
            .layout {
                max-width: 100%;
            }

            .menu-btn {
                display: block;
            }

            .sidebar {
                position: fixed;
                left: 0;
                top: 60px;
                transform: translateX(-100%);
                background-color: var(--bg-color);
                box-shadow: 2px 0 10px rgba(0, 0, 0, 0.1);
                --sidebar-z: 1100;
                height: calc(100vh - 60px);
            }

            .sidebar.show {
                transform: translateX(0);
            }

            .feed {
                border-left: none;
                border-right: none;
                width: 100%;
            }

            .search-container input {
                width: 120px;
            }

            .top-right-hint {
                display: none;
            }
        }
    </style>
</head>

<body>
    <!-- Barra superior -->
    <header class="top-bar">
        <div class="top-bar-left">
            <button class="menu-btn" id="mobile-menu-btn" title="Menú">☰</button>
            <div class="logo">Notter</div>
        </div>

        <div class="search-container">
            <input type="text" id="search-input" placeholder="Buscar..." />
        </div>

        <div class="top-bar-right">
            <select class="theme-selector" id="theme-selector">
                <option value="light">Light</option>
                <option value="dark">Dark</option>
                <option value="macos">macGlass</option>
                <option value="pixel">Pixel Art</option>
                <option value="nature">Nature</option>
                <option value="pride">Pride</option>
            </select>
        </div>
    </header>

    <!-- Layout principal -->
    <div class="layout">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <ul id="area-list"></ul>

            <div class="sidebar-footer">
                <button id="btn-new-section" class="btn-secondary btn-full-width" style="margin-bottom: 10px;">
                    + Nueva sección
                </button>

                <div class="backup-tools"
                    style="border-top: 1px solid var(--border-color); padding-top: 10px; margin-top: 10px;">
                    <p
                        style="font-size: 0.75rem; color: var(--text-muted); margin-bottom: 8px; font-weight: bold; text-transform: uppercase;">
                        Copia de seguridad</p>
                    <div style="display: flex; gap: 5px; flex-direction: column;">
                        <button id="btn-export" class="btn-secondary btn-full-width"
                            style="font-size: 0.8rem; padding: 6px 10px;">
                            📥 Exportar JSON
                        </button>
                        <button id="btn-import-trigger" class="btn-secondary btn-full-width"
                            style="font-size: 0.8rem; padding: 6px 10px;">
                            📤 Importar JSON
                        </button>
                    </div>
                    <input type="file" id="import-file" accept=".json" style="display: none;">
                </div>
            </div>
        </aside>

        <!-- Feed central -->
        <main class="feed">
            <div id="feed-header">
                <h2 id="current-area-title">Todas las notas</h2>
            </div>
            <div id="notes-container"></div>
        </main>
    </div>

    <!-- Botón flotante para añadir nota -->
    <button id="fab-add" title="Crear nueva nota">+</button>

    <!-- Modal: Nueva / Editar nota -->
    <div id="modal-overlay" class="hidden">
        <div class="modal-card">
            <h3>Nueva Nota</h3>
            <form id="new-note-form">
                <div class="form-group">
                    <label for="note-title">Título</label>
                    <input type="text" id="note-title" required placeholder="Escribe un título breve" />
                </div>

                <div class="form-group">
                    <label for="note-area">Sección</label>
                    <select id="note-area" required></select>
                </div>

                <div class="form-group">
                    <label for="note-desc">Descripción</label>
                    <textarea id="note-desc" rows="4" required placeholder="Detalles de la nota..."></textarea>
                </div>

                <div class="modal-actions">
                    <button type="button" id="btn-cancel" class="btn-secondary">
                        Cancelar
                    </button>
                    <button type="submit" class="btn-primary">
                        Guardar
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- Modal: Nueva sección -->
    <div id="section-modal-overlay" class="hidden">
        <div class="modal-card">
            <h3>Nueva sección</h3>
            <form id="new-section-form">
                <div class="form-group">
                    <label for="section-name">Nombre de la sección</label>
                    <input type="text" id="section-name" required placeholder="Ej: Conciertos, Personal, Trabajo..." />
                </div>

                <div class="form-group">
                    <label for="section-color">Color</label>
                    <input type="color" id="section-color" value="#22c55e" />
                </div>

                <div class="modal-actions">
                    <button type="button" id="btn-cancel-section" class="btn-secondary">
                        Cancelar
                    </button>
                    <button type="submit" class="btn-primary">
                        Crear sección
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- Modal: Confirmación de borrado -->
    <div id="confirm-modal-overlay" class="hidden">
        <div class="modal-card" style="max-width: 350px;">
            <h3>¿Eliminar nota?</h3>
            <p style="color: var(--text-muted); margin-bottom: 20px;">Esta acción no se puede deshacer.</p>
            <div class="modal-actions">
                <button type="button" id="btn-cancel-confirm" class="btn-secondary">Cancelar</button>
                <button type="button" id="btn-do-delete" class="btn-primary"
                    style="background-color: #f4212e;">Eliminar</button>
            </div>
        </div>
    </div>

    <!-- Lógica de la app -->
    <script>
        const NotterApp = {
            STORAGE_KEYS: {
                NOTES: "localnotes_notes",
                SECTIONS: "localnotes_sections",
                THEME: "notter_theme"
            },

            state: {
                sections: [],
                notes: [],
                currentFilter: "Todas",
                editingNoteId: null,
            },

            elements: {},

            init() {
                this.elements = {
                    sidebar: document.getElementById("sidebar"),
                    mobileMenuBtn: document.getElementById("mobile-menu-btn"),
                    themeSelector: document.getElementById("theme-selector"),
                    areaList: document.getElementById("area-list"),
                    notesContainer: document.getElementById("notes-container"),
                    currentAreaTitle: document.getElementById("current-area-title"),
                    searchInput: document.getElementById("search-input"),
                    modalOverlay: document.getElementById("modal-overlay"),
                    newNoteForm: document.getElementById("new-note-form"),
                    fabAdd: document.getElementById("fab-add"),
                    btnCancel: document.getElementById("btn-cancel"),
                    selectSection: document.getElementById("note-area"),
                    sectionModalOverlay: document.getElementById("section-modal-overlay"),
                    newSectionForm: document.getElementById("new-section-form"),
                    btnNewSection: document.getElementById("btn-new-section"),
                    btnCancelSection: document.getElementById("btn-cancel-section"),
                    btnExport: document.getElementById("btn-export"),
                    btnImportTrigger: document.getElementById("btn-import-trigger"),
                    importFile: document.getElementById("import-file"),
                    confirmModalOverlay: document.getElementById("confirm-modal-overlay"),
                    btnCancelConfirm: document.getElementById("btn-cancel-confirm"),
                    btnDoDelete: document.getElementById("btn-do-delete"),
                };

                this.theme.init();
                this.loadData();
                this.bindEvents();
                this.render();
            },

            theme: {
                init() {
                    const t = localStorage.getItem(NotterApp.STORAGE_KEYS.THEME) || 'light';
                    this.set(t);
                    NotterApp.elements.themeSelector.value = t;
                },
                set(t) {
                    document.body.className = `theme-${t}`;
                    localStorage.setItem(NotterApp.STORAGE_KEYS.THEME, t);
                }
            },

            loadData() {
                try {
                    const rawNotes = localStorage.getItem(this.STORAGE_KEYS.NOTES);
                    this.state.notes = rawNotes ? JSON.parse(rawNotes) : [];

                    const rawSections = localStorage.getItem(this.STORAGE_KEYS.SECTIONS);
                    this.state.sections = rawSections ? JSON.parse(rawSections) : [];

                    if (!this.state.sections.some(s => s.id === "general")) {
                        this.state.sections.unshift({ id: "general", name: "General", color: "#1DA1F2" });
                    }
                } catch (e) {
                    this.state.notes = [];
                    this.state.sections = [{ id: "general", name: "General", color: "#1DA1F2" }];
                }
            },

            saveData() {
                localStorage.setItem(this.STORAGE_KEYS.NOTES, JSON.stringify(this.state.notes));
                localStorage.setItem(this.STORAGE_KEYS.SECTIONS, JSON.stringify(this.state.sections));
            },

            bindEvents() {
                this.elements.mobileMenuBtn.addEventListener("click", () => {
                    this.elements.sidebar.classList.toggle("show");
                });

                this.elements.themeSelector.addEventListener("change", (e) => {
                    this.theme.set(e.target.value);
                });

                this.elements.fabAdd.addEventListener("click", () => this.openNoteModal());
                this.elements.btnCancel.addEventListener("click", () => this.closeNoteModal());
                this.elements.newNoteForm.addEventListener("submit", (e) => this.handleNoteSubmit(e));
                this.elements.btnNewSection.addEventListener("click", () => this.openSectionModal());
                this.elements.btnCancelSection.addEventListener("click", () => this.closeSectionModal());
                this.elements.newSectionForm.addEventListener("submit", (e) => this.handleSectionSubmit(e));
                this.elements.searchInput.addEventListener("input", () => this.renderFeed());
                this.elements.btnExport.addEventListener("click", () => this.exportJSON());
                this.elements.btnImportTrigger.addEventListener("click", () => this.elements.importFile.click());
                this.elements.importFile.addEventListener("change", (e) => this.importJSON(e));
                this.elements.btnCancelConfirm.addEventListener("click", () => this.closeConfirmModal());
                
                // Close sidebar on click outside on mobile
                document.addEventListener("click", (e) => {
                    if (window.innerWidth <= 900) {
                        if (!this.elements.sidebar.contains(e.target) && !this.elements.mobileMenuBtn.contains(e.target)) {
                            this.elements.sidebar.classList.remove("show");
                        }
                    }
                });
            },

            render() {
                this.renderSidebar();
                this.populateSectionSelect();
                this.renderFeed();
            },

            renderSidebar() {
                this.elements.areaList.innerHTML = "";
                const allItem = this.createSidebarItem("Todas", "Todas", null);
                this.elements.areaList.appendChild(allItem);
                this.state.sections.forEach(section => {
                    const item = this.createSidebarItem(section.name, section.id, section.color);
                    this.elements.areaList.appendChild(item);
                });
            },

            createSidebarItem(name, id, color) {
                const li = document.createElement("li");
                if (this.state.currentFilter === id) li.classList.add("active");
                if (color) {
                    const dot = document.createElement("span");
                    dot.className = "section-color-dot";
                    dot.style.backgroundColor = color;
                    li.appendChild(dot);
                }
                const label = document.createElement("span");
                label.textContent = name;
                li.appendChild(label);
                li.addEventListener("click", () => {
                    this.state.currentFilter = id;
                    this.elements.currentAreaTitle.textContent = id === "Todas" ? "Todas las notas" : name;
                    this.render();
                    if (window.innerWidth <= 900) this.elements.sidebar.classList.remove("show");
                });
                return li;
            },

            populateSectionSelect() {
                this.elements.selectSection.innerHTML = "";
                this.state.sections.forEach(section => {
                    const opt = document.createElement("option");
                    opt.value = section.id;
                    opt.textContent = section.name;
                    this.elements.selectSection.appendChild(opt);
                });
            },

            renderFeed() {
                this.elements.notesContainer.innerHTML = "";
                const query = this.elements.searchInput.value.toLowerCase().trim();
                let filtered = this.state.notes.filter(note => {
                    const matchesSection = this.state.currentFilter === "Todas" || note.sectionId === this.state.currentFilter;
                    const text = ((note.title || "") + " " + (note.description || "")).toLowerCase();
                    return matchesSection && text.includes(query);
                });
                if (filtered.length === 0) {
                    this.elements.notesContainer.innerHTML = '<p style="padding: 40px; text-align: center; color: var(--text-muted);">No se han encontrado notas.</p>';
                    return;
                }
                filtered.sort((a, b) => {
                    if (a.pinned && !b.pinned) return -1;
                    if (!a.pinned && b.pinned) return 1;
                    return (b.timestamp || 0) - (a.timestamp || 0);
                });
                filtered.forEach(note => {
                    const card = this.createNoteCard(note);
                    this.elements.notesContainer.appendChild(card);
                });
            },

            createNoteCard(note) {
                const section = this.state.sections.find(s => s.id === note.sectionId) || { name: "Sin sección", color: "#ccc" };
                const date = note.timestamp ? new Date(note.timestamp).toLocaleString("es-ES", { day: "2-digit", month: "short", hour: "2-digit", minute: "2-digit" }) : "";
                const card = document.createElement("article");
                card.className = "note-card";
                if (note.pinned) card.classList.add("pinned");
                card.style.borderColor = section.color;
                const descriptionHtml = this.linkify(note.description || "");
                card.innerHTML = `
                    <div class="note-header">
                        <div><span class="note-area-tag" style="background-color:${section.color};">${this.escapeHtml(section.name)}</span></div>
                        <span class="note-date">${this.escapeHtml(date)}</span>
                    </div>
                    <h3 class="note-title" style="margin-top: 10px;">${this.escapeHtml(note.title || "")}</h3>
                    <p class="note-desc">${descriptionHtml}</p>
                    <div class="note-meta-row">
                        <div>${note.pinned ? '<span class="pin-badge">📌 Nota fijada</span>' : ""}</div>
                        <div class="note-actions">
                            <button type="button" data-action="pin" data-id="${note.id}">${note.pinned ? "📍 Quitar fija" : "📍 Fijar"}</button>
                            <button type="button" data-action="edit" data-id="${note.id}">✏️ Editar</button>
                            <button type="button" class="delete-btn" data-action="delete" data-id="${note.id}">🗑️ Borrar</button>
                        </div>
                    </div>
                `;
                card.querySelectorAll("button").forEach(btn => {
                    btn.addEventListener("click", (e) => {
                        this.handleNoteAction(e.currentTarget.dataset.action, e.currentTarget.dataset.id);
                    });
                });
                return card;
            },

            handleNoteAction(action, id) {
                switch (action) {
                    case "delete": this.askDeleteNote(id); break;
                    case "edit": this.openEditModal(id); break;
                    case "pin": this.togglePin(id); break;
                }
            },

            askDeleteNote(id) {
                this.state.idToDelete = id;
                this.elements.confirmModalOverlay.classList.remove("hidden");
                this.elements.btnDoDelete.onclick = () => {
                    if (this.state.idToDelete) {
                        this.deleteNote(this.state.idToDelete);
                        this.closeConfirmModal();
                    }
                };
            },

            closeConfirmModal() {
                this.elements.confirmModalOverlay.classList.add("hidden");
                this.state.idToDelete = null;
            },

            deleteNote(id) {
                this.state.notes = this.state.notes.filter(n => String(n.id) !== String(id));
                this.saveData();
                this.renderFeed();
            },

            togglePin(id) {
                const note = this.state.notes.find(n => String(n.id) === String(id));
                if (note) {
                    note.pinned = !note.pinned;
                    this.saveData();
                    this.renderFeed();
                }
            },

            openNoteModal(id = null) {
                this.state.editingNoteId = id;
                const titleEl = this.elements.modalOverlay.querySelector("h3");
                if (id) {
                    const note = this.state.notes.find(n => String(n.id) === String(id));
                    if (!note) return;
                    titleEl.textContent = "Editar Nota";
                    document.getElementById("note-title").value = note.title;
                    document.getElementById("note-desc").value = note.description;
                    this.elements.selectSection.value = note.sectionId;
                } else {
                    titleEl.textContent = "Nueva Nota";
                    this.elements.newNoteForm.reset();
                    if (this.state.currentFilter !== "Todas") this.elements.selectSection.value = this.state.currentFilter;
                }
                this.elements.modalOverlay.classList.remove("hidden");
            },

            openEditModal(id) { this.openNoteModal(id); },
            closeNoteModal() {
                this.elements.modalOverlay.classList.add("hidden");
                this.state.editingNoteId = null;
            },

            handleNoteSubmit(e) {
                e.preventDefault();
                const title = document.getElementById("note-title").value.trim();
                const description = document.getElementById("note-desc").value.trim();
                const sectionId = this.elements.selectSection.value;
                const now = Date.now();

                if (this.state.editingNoteId) {
                    const idx = this.state.notes.findIndex(n => String(n.id) === String(this.state.editingNoteId));
                    if (idx !== -1) this.state.notes[idx] = { ...this.state.notes[idx], title, description, sectionId, timestamp: now };
                } else {
                    this.state.notes.push({ id: now, title, description, sectionId, timestamp: now, pinned: false });
                }

                this.saveData();
                this.closeNoteModal();
                this.renderFeed();
            },

            openSectionModal() {
                this.elements.newSectionForm.reset();
                document.getElementById("section-color").value = "#22c55e";
                this.elements.sectionModalOverlay.classList.remove("hidden");
            },

            closeSectionModal() { this.elements.sectionModalOverlay.classList.add("hidden"); },

            handleSectionSubmit(e) {
                e.preventDefault();
                const name = document.getElementById("section-name").value.trim();
                const color = document.getElementById("section-color").value;
                if (this.state.sections.some(s => s.name.toLowerCase() === name.toLowerCase())) {
                    alert("Ya existe una sección con ese nombre.");
                    return;
                }
                this.state.sections.push({ id: "sec_" + Date.now(), name, color });
                this.saveData();
                this.closeSectionModal();
                this.renderSidebar();
                this.populateSectionSelect();
            },

            exportJSON() {
                const data = { notes: this.state.notes, sections: this.state.sections, version: "1.2", exportedAt: new Date().toISOString() };
                const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
                const url = URL.createObjectURL(blob);
                const a = document.createElement("a");
                a.href = url;
                a.download = `notter_backup_${new Date().toISOString().split('T')[0]}.json`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
            },

            importJSON(e) {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (event) => {
                    try {
                        const data = JSON.parse(event.target.result);
                        if (!data.notes || !data.sections) throw new Error("Formato inválido");
                        if (confirm("¿Importar datos?")) {
                            const existingNoteIds = new Set(this.state.notes.map(n => String(n.id)));
                            data.notes.forEach(n => { if (!existingNoteIds.has(String(n.id))) this.state.notes.push(n); });
                            const existingSectionIds = new Set(this.state.sections.map(s => String(s.id)));
                            data.sections.forEach(s => { if (!existingSectionIds.has(String(s.id))) this.state.sections.push(s); });
                            this.saveData();
                            this.render();
                        }
                    } catch (err) { alert("Error: " + err.message); }
                };
                reader.readAsText(file);
                e.target.value = "";
            },

            escapeHtml(text) {
                if (!text) return "";
                const div = document.createElement("div");
                div.textContent = String(text);
                return div.innerHTML;
            },

            linkify(text) {
                const escaped = this.escapeHtml(text);
                const urlPattern = /(\bhttps?:\/\/[^\s<]+|\bwww\.[^\s<]+)/gi;
                return escaped.replace(urlPattern, (url) => {
                    let href = url;
                    if (!/^https?:\/\//i.test(href)) href = "https://" + href;
                    return `<a href="${href}" target="_blank" rel="noopener noreferrer">${url}</a>`;
                });
            }
        };

        document.addEventListener("DOMContentLoaded", () => NotterApp.init());
    </script>
</body>

</html>
