<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dathail Color Palette | IARANN Suite</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #ffffff;
            --text-color: #1a1c1e;
            --border-color: #e1e4e8;
            --primary-color: #0066cc;
            --primary-hover: #0052a3;
            --shadow: 0 4px 12px rgba(0,0,0,0.1);
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #121212;
                --text-color: #f0f0f0;
                --border-color: #333;
            }
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            height: 100vh;
            overflow: hidden;
        }

        .app-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        .app-header {
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
            background: var(--bg-color);
            z-index: 10;
        }

        .logo-section h1 { font-size: 1.2rem; font-weight: 700; color: var(--primary-color); }
        .logo-section p { font-size: 0.8rem; color: #666; }

        .controls-section { display: flex; gap: 10px; }

        select, .btn {
            padding: 8px 16px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            font-size: 0.9rem;
            cursor: pointer;
            font-family: inherit;
        }

        .btn.primary { background: var(--primary-color); color: white; border: none; }
        .btn.primary:hover { background: var(--primary-hover); }
        .btn.secondary { background: transparent; color: var(--text-color); }

        /* Grid de Colores */
        .palette-grid {
            flex: 1;
            display: flex;
            width: 100%;
        }

        .color-column {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-end;
            padding-bottom: 3rem;
            gap: 2rem;
            transition: all 0.2s ease;
            position: relative;
        }

        .color-info {
            text-align: center;
            background: rgba(255,255,255,0.2);
            backdrop-filter: blur(5px);
            padding: 15px;
            border-radius: 12px;
            min-width: 100px;
        }

        .hex-value {
            font-weight: 700;
            font-size: 1.2rem;
            margin-bottom: 10px;
            cursor: pointer;
            display: block;
        }

        .action-icon {
            background: none;
            border: none;
            cursor: pointer;
            padding: 5px;
            border-radius: 5px;
            transition: transform 0.1s;
            font-size: 1.2rem;
        }

        .action-icon:active { transform: scale(0.9); }

        /* Modal y Utils */
        .hidden { display: none !important; }

        .modal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        .modal-content {
            background: var(--bg-color);
            padding: 2rem;
            border-radius: 15px;
            width: 90%;
            max-width: 500px;
            box-shadow: var(--shadow);
        }

        .modal-content h3 {
            margin-bottom: 1rem;
        }

        textarea {
            width: 100%;
            height: 200px;
            margin: 1rem 0;
            padding: 10px;
            font-family: monospace;
            background: #f8f9fa;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            resize: none;
        }

        .toast {
            position: fixed;
            bottom: 20px; left: 50%;
            transform: translateX(-50%);
            background: #333; color: white;
            padding: 10px 20px;
            border-radius: 20px;
            opacity: 0; transition: opacity 0.3s;
            pointer-events: none;
            z-index: 1000;
        }

        @media (max-width: 768px) {
            .palette-grid { flex-direction: column; }
            .color-column { padding: 1rem; flex-direction: row; justify-content: space-between; }
            .app-header { flex-direction: column; gap: 1rem; height: auto; padding: 1rem; }
            .logo-section { text-align: center; }
        }
    </style>
</head>
<body>
    <div class="app-container">
        <header class="app-header">
            <div class="logo-section">
                <h1>Dathail Color Palette</h1>
                <p>Press <strong>Spacebar</strong> to generate new colors!</p>
            </div>
            <div class="controls-section">
                <select id="harmony-rule">
                    <option value="random">Random Colors</option>
                    <option value="analogous">Analogous</option>
                    <option value="monochromatic">Monochromatic</option>
                    <option value="complementary">Complementary</option>
                    <option value="triadic">Triadic</option>
                </select>
                <button id="btn-generate" class="btn primary">Generate</button>
                <button id="btn-export" class="btn secondary">Export CSS</button>
            </div>
        </header>

        <main id="palette-grid" class="palette-grid">
            <!-- Colors will be generated here -->
        </main>

        <footer class="app-footer" style="padding: 10px; text-align: center; border-top: 1px solid var(--border-color); font-size: 0.8rem; color: #666;">
            <p>&copy; <span id="year"></span> IARANN Suite | Web Design Utilities</p>
        </footer>
    </div>

    <div id="export-modal" class="modal hidden">
        <div class="modal-content">
            <h3>CSS Variables</h3>
            <textarea id="css-output" readonly></textarea>
            <button id="btn-close-modal" class="btn primary">Close</button>
        </div>
    </div>

    <div id="toast" class="toast">Copied to clipboard!</div>

    <script>
        document.getElementById('year').textContent = new Date().getFullYear();

        const paletteGrid = document.getElementById('palette-grid');
        const btnGenerate = document.getElementById('btn-generate');
        const harmonyRule = document.getElementById('harmony-rule');
        const btnExport = document.getElementById('btn-export');
        const exportModal = document.getElementById('export-modal');
        const cssOutput = document.getElementById('css-output');
        const btnCloseModal = document.getElementById('btn-close-modal');

        let colors = [];
        const numColors = 5;

        // Inicializar
        function init() {
            for (let i = 0; i < numColors; i++) {
                colors.push({ hex: generateRandomHex(), locked: false });
            }
            renderPalette();
        }

        function generateRandomHex() {
            return '#' + Math.floor(Math.random() * 16777215).toString(16).padStart(6, '0').toUpperCase();
        }

        // Lógica de Luminancia para contraste (Texto blanco o negro)
        function getContrastColor(hex) {
            const r = parseInt(hex.substring(1, 3), 16);
            const g = parseInt(hex.substring(3, 5), 16);
            const b = parseInt(hex.substring(5, 7), 16);
            const yiq = ((r * 299) + (g * 587) + (b * 114)) / 1000;
            return (yiq >= 128) ? '#1a1c1e' : '#ffffff';
        }

        function renderPalette() {
            paletteGrid.innerHTML = '';
            colors.forEach((color, index) => {
                const col = document.createElement('div');
                col.className = 'color-column';
                col.style.backgroundColor = color.hex;
                
                const textColor = getContrastColor(color.hex);
                
                col.innerHTML = `
                    <div class="color-info" style="color: ${textColor}; background: ${color.hex === '#FFFFFF' ? 'rgba(0,0,0,0.05)' : 'rgba(255,255,255,0.2)'}">
                        <span class="hex-value" onclick="copyToClipboard('${color.hex}')">${color.hex}</span>
                        <button class="action-icon" style="color: ${textColor}" onclick="toggleLock(${index})">
                            ${color.locked ? '🔒' : '🔓'}
                        </button>
                    </div>
                `;
                paletteGrid.appendChild(col);
            });
        }

        function toggleLock(index) {
            colors[index].locked = !colors[index].locked;
            renderPalette();
        }

        function generateNewPalette() {
            const rule = harmonyRule.value;
            
            if (rule === 'random') {
                colors = colors.map(c => c.locked ? c : { hex: generateRandomHex(), locked: false });
            } else {
                // Para reglas de armonía, tomamos el primer color no bloqueado o el primero de la lista
                const baseColor = colors.find(c => c.locked)?.hex || generateRandomHex();
                const harmony = generateHarmony(baseColor, rule);
                
                colors = colors.map((c, i) => c.locked ? c : { hex: harmony[i], locked: false });
            }
            renderPalette();
        }

        // Generador de Armonías simplificado (HSL rotation)
        function generateHarmony(hex, rule) {
            let hsl = hexToHSL(hex);
            let palette = [hex];

            for (let i = 1; i < 5; i++) {
                let newH = hsl.h;
                if (rule === 'analogous') newH = (hsl.h + (i * 15)) % 360;
                if (rule === 'monochromatic') return Array(5).fill(0).map((_, idx) => hslToHex(hsl.h, hsl.s, 20 + (idx * 15)));
                if (rule === 'complementary') newH = i % 2 === 0 ? hsl.h : (hsl.h + 180) % 360;
                if (rule === 'triadic') newH = (hsl.h + (i * 120)) % 360;
                
                palette.push(hslToHex(newH, hsl.s, hsl.l));
            }
            return palette;
        }

        // Helpers de conversión de color
        function hexToHSL(hex) {
            let r = parseInt(hex.slice(1, 3), 16) / 255;
            let g = parseInt(hex.slice(3, 5), 16) / 255;
            let b = parseInt(hex.slice(5, 7), 16) / 255;
            let max = Math.max(r, g, b), min = Math.min(r, g, b);
            let h, s, l = (max + min) / 2;
            if (max === min) h = s = 0;
            else {
                let d = max - min;
                s = l > 0.5 ? d / (2 - max - min) : d / (max + min);
                switch (max) {
                    case r: h = (g - b) / d + (g < b ? 6 : 0); break;
                    case g: h = (b - r) / d + 2; break;
                    case b: h = (r - g) / d + 4; break;
                }
                h /= 6;
            }
            return { h: h * 360, s: s * 100, l: l * 100 };
        }

        function hslToHex(h, s, l) {
            l /= 100;
            const a = s * Math.min(l, 1 - l) / 100;
            const f = n => {
                const k = (n + h / 30) % 12;
                const color = l - a * Math.max(Math.min(k - 3, 9 - k, 1), -1);
                return Math.round(255 * color).toString(16).padStart(2, '0');
            };
            return `#${f(0)}${f(8)}${f(4)}`.toUpperCase();
        }

        function copyToClipboard(text) {
            navigator.clipboard.writeText(text).then(() => {
                const toast = document.getElementById('toast');
                toast.style.opacity = 1;
                setTimeout(() => toast.style.opacity = 0, 1500);
            });
        }

        // Eventos
        window.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                generateNewPalette();
            }
        });

        btnGenerate.addEventListener('click', generateNewPalette);

        btnExport.addEventListener('click', () => {
            let css = ":root {\n";
            colors.forEach((c, i) => css += `  --color-${i + 1}: ${c.hex};\n`);
            css += "}";
            cssOutput.value = css;
            exportModal.classList.remove('hidden');
        });

        btnCloseModal.addEventListener('click', () => exportModal.classList.add('hidden'));

        init();
    </script>
</body>
</html>
