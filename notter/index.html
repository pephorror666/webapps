<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Notas locales - Notter</title>
    <style>
        /* Variables de diseño */
        :root {
            --primary-color: #1DA1F2;
            /* Azul estilo Twitter */
            --primary-hover: #1a91da;
            --bg-color: #f7f9f9;
            --card-bg: #ffffff;
            --text-main: #0f1419;
            --text-muted: #536471;
            --border-color: #eff3f4;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
                Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
        }

        /* Barra superior */
        .top-bar {
            position: sticky;
            top: 0;
            background-color: var(--card-bg);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 20px;
            border-bottom: 1px solid var(--border-color);
            z-index: 100;
        }

        .logo {
            font-size: 1.2rem;
            font-weight: bold;
            color: var(--primary-color);
            text-decoration: none;
        }

        .search-container input {
            padding: 10px 15px;
            border-radius: 20px;
            border: 1px solid var(--border-color);
            background-color: #eff3f4;
            width: 300px;
            font-size: 0.9rem;
            outline: none;
            transition: background-color 0.2s;
        }

        .search-container input:focus {
            background-color: var(--card-bg);
            border-color: var(--primary-color);
        }

        .top-right-hint {
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        /* Layout principal */
        .layout {
            display: flex;
            max-width: 1000px;
            margin: 0 auto;
            padding-top: 10px;
        }

        /* Menú lateral */
        .sidebar {
            width: 250px;
            padding: 20px 10px;
            position: sticky;
            top: 60px;
            height: calc(100vh - 60px);
        }

        .sidebar ul {
            list-style: none;
        }

        .sidebar li {
            padding: 12px 20px;
            margin-bottom: 5px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 1.1rem;
            transition: background-color 0.2s, color 0.2s;
            display: flex;
            align-items: center;
        }

        .sidebar li:hover {
            background-color: #e8f5fe;
            color: var(--primary-color);
        }

        .sidebar li.active {
            font-weight: bold;
            color: var(--primary-color);
        }

        .sidebar-footer {
            margin-top: 15px;
            padding: 10px;
        }

        /* Puntito de color de cada sección */
        .section-color-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            margin-right: 8px;
            border: 1px solid #ccc;
            flex-shrink: 0;
        }

        /* Feed central */
        .feed {
            flex: 1;
            border-left: 1px solid var(--border-color);
            border-right: 1px solid var(--border-color);
            min-height: 100vh;
            background-color: var(--card-bg);
        }

        #feed-header {
            padding: 15px 20px;
            border-bottom: 1px solid var(--border-color);
            background-color: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(5px);
            position: sticky;
            top: 55px;
            z-index: 90;
        }

        /* Tarjetas de notas */
        .note-card {
            padding: 16px 20px;
            border-bottom: 1px solid var(--border-color);
            transition: background-color 0.2s, box-shadow 0.2s, transform 0.1s;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            /* Se sobreescribe con el color de la sección */
            margin: 8px 12px;
            background-color: var(--card-bg);
        }

        .note-card:hover {
            background-color: #f7f9f9;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.06);
            transform: translateY(-1px);
        }

        /* Estado fijado */
        .note-card.pinned {
            background-color: #fffbeb;
            /* amarillito suave */
            box-shadow: 0 0 0 1px #facc15;
        }

        .note-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
        }

        .note-area-tag {
            font-size: 0.8rem;
            background-color: var(--primary-color);
            color: white;
            padding: 2px 8px;
            border-radius: 10px;
            font-weight: bold;
        }

        .note-date {
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        .note-title {
            font-size: 1.1rem;
            margin-bottom: 5px;
        }

        .note-desc {
            color: var(--text-muted);
            line-height: 1.5;
            white-space: pre-wrap;
        }

        .note-meta-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 8px;
        }

        .pin-badge {
            font-size: 0.8rem;
            color: #92400e;
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }

        /* Botón flotante (FAB) */
        #fab-add {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 50%;
            width: 60px;
            height: 60px;
            font-size: 30px;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
            transition: transform 0.2s, background-color 0.2s;
            z-index: 150;
        }

        #fab-add:hover {
            background-color: var(--primary-hover);
            transform: scale(1.05);
        }

        /* Modal (Pop-up) */
        .hidden {
            display: none !important;
        }

        #modal-overlay,
        #section-modal-overlay,
        #confirm-modal-overlay {
            /* <-- Añadido aquí */
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(0, 0, 0, 0.5);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 200;
        }

        .modal-card {
            background-color: var(--card-bg);
            width: 100%;
            max-width: 500px;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
        }

        .modal-card h3 {
            margin-bottom: 20px;
            font-size: 1.3rem;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 10px;
        }

        .form-group {
            margin-bottom: 15px;
            display: flex;
            flex-direction: column;
        }

        .form-group label {
            margin-bottom: 5px;
            font-weight: bold;
            font-size: 0.9rem;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 1rem;
        }

        .modal-actions {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-top: 20px;
        }

        button {
            cursor: pointer;
        }

        .btn-secondary {
            background-color: transparent;
            border: 1px solid var(--border-color);
            padding: 10px 20px;
            border-radius: 20px;
            font-weight: bold;
        }

        .btn-primary {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 20px;
            font-weight: bold;
        }

        .btn-primary:hover {
            background-color: var(--primary-hover);
        }

        .btn-full-width {
            width: 100%;
            text-align: center;
        }

        /* Acciones de la nota */
        .note-actions {
            margin-top: 10px;
            display: flex;
            gap: 15px;
            justify-content: flex-end;
        }

        .note-actions button {
            background: none;
            border: none;
            color: var(--primary-color);
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 500;
        }

        .note-actions button.delete-btn {
            color: #f4212e;
        }

        .note-actions button:hover {
            text-decoration: underline;
        }

        /* Enlaces dentro de la descripción */
        .note-desc a {
            color: var(--primary-color);
            text-decoration: underline;
            word-break: break-all;
            /* por si la URL es muy larga */
        }

        /* Responsivo básico */
        @media (max-width: 900px) {
            .layout {
                max-width: 100%;
            }

            .sidebar {
                display: none;
            }

            .feed {
                border-left: none;
                border-right: none;
                width: 100%;
            }

            .search-container input {
                width: 180px;
            }
        }
    </style>
</head>

<body>
    <!-- Barra superior -->
    <header class="top-bar">
        <div class="logo">Notter</div>

        <div class="search-container">
            <input type="text" id="search-input" placeholder="Buscar en las notas..." />
        </div>

        <div class="top-right-hint">
            <span>Se guardan en localStorage</span>
        </div>
    </header>

    <!-- Layout principal -->
    <div class="layout">
        <!-- Sidebar -->
        <aside class="sidebar">
            <ul id="area-list"></ul>

            <div class="sidebar-footer">
                <button id="btn-new-section" class="btn-secondary btn-full-width" style="margin-bottom: 10px;">
                    + Nueva sección
                </button>

                <div class="backup-tools"
                    style="border-top: 1px solid var(--border-color); padding-top: 10px; margin-top: 10px;">
                    <p
                        style="font-size: 0.75rem; color: var(--text-muted); margin-bottom: 8px; font-weight: bold; text-transform: uppercase;">
                        Copia de seguridad</p>
                    <div style="display: flex; gap: 5px; flex-direction: column;">
                        <button id="btn-export" class="btn-secondary btn-full-width"
                            style="font-size: 0.8rem; padding: 6px 10px;">
                            📥 Exportar JSON
                        </button>
                        <button id="btn-import-trigger" class="btn-secondary btn-full-width"
                            style="font-size: 0.8rem; padding: 6px 10px;">
                            📤 Importar JSON
                        </button>
                    </div>
                    <input type="file" id="import-file" accept=".json" style="display: none;">
                </div>
            </div>
        </aside>

        <!-- Feed central -->
        <main class="feed">
            <div id="feed-header">
                <h2 id="current-area-title">Todas las notas</h2>
            </div>
            <div id="notes-container"></div>
        </main>
    </div>

    <!-- Botón flotante para añadir nota -->
    <button id="fab-add" title="Crear nueva nota">+</button>

    <!-- Modal: Nueva / Editar nota -->
    <div id="modal-overlay" class="hidden">
        <div class="modal-card">
            <h3>Nueva Nota</h3>
            <form id="new-note-form">
                <div class="form-group">
                    <label for="note-title">Título</label>
                    <input type="text" id="note-title" required placeholder="Escribe un título breve" />
                </div>

                <div class="form-group">
                    <label for="note-area">Sección</label>
                    <select id="note-area" required></select>
                </div>

                <div class="form-group">
                    <label for="note-desc">Descripción</label>
                    <textarea id="note-desc" rows="4" required placeholder="Detalles de la nota..."></textarea>
                </div>

                <div class="modal-actions">
                    <button type="button" id="btn-cancel" class="btn-secondary">
                        Cancelar
                    </button>
                    <button type="submit" class="btn-primary">
                        Guardar
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- Modal: Nueva sección -->
    <div id="section-modal-overlay" class="hidden">
        <div class="modal-card">
            <h3>Nueva sección</h3>
            <form id="new-section-form">
                <div class="form-group">
                    <label for="section-name">Nombre de la sección</label>
                    <input type="text" id="section-name" required placeholder="Ej: Conciertos, Personal, Trabajo..." />
                </div>

                <div class="form-group">
                    <label for="section-color">Color</label>
                    <input type="color" id="section-color" value="#22c55e" />
                </div>

                <div class="modal-actions">
                    <button type="button" id="btn-cancel-section" class="btn-secondary">
                        Cancelar
                    </button>
                    <button type="submit" class="btn-primary">
                        Crear sección
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- Modal: Confirmación de borrado -->
    <div id="confirm-modal-overlay" class="hidden">
        <div class="modal-card" style="max-width: 350px;">
            <h3>¿Eliminar nota?</h3>
            <p style="color: var(--text-muted); margin-bottom: 20px;">Esta acción no se puede deshacer.</p>
            <div class="modal-actions">
                <button type="button" id="btn-cancel-confirm" class="btn-secondary">Cancelar</button>
                <button type="button" id="btn-do-delete" class="btn-primary"
                    style="background-color: #f4212e;">Eliminar</button>
            </div>
        </div>
    </div>

    <!-- Lógica de la app -->
    <script>
        /**
         * Notter: Aplicación de notas locales (Standalone)
         * State management y lógica del DOM
         */

        const NotterApp = {
            // Claves para localStorage
            STORAGE_KEYS: {
                NOTES: "localnotes_notes",
                SECTIONS: "localnotes_sections",
            },

            // Estado global de la aplicación
            state: {
                sections: [],
                notes: [],
                currentFilter: "Todas", // "Todas" o id de sección
                editingNoteId: null,
            },

            // Referencias a elementos del DOM
            elements: {},

            // Inicialización de la aplicación
            init() {
                console.log("Inicializando NotterApp...");

                // Mapear elementos del DOM
                this.elements = {
                    areaList: document.getElementById("area-list"),
                    notesContainer: document.getElementById("notes-container"),
                    currentAreaTitle: document.getElementById("current-area-title"),
                    searchInput: document.getElementById("search-input"),
                    modalOverlay: document.getElementById("modal-overlay"),
                    newNoteForm: document.getElementById("new-note-form"),
                    fabAdd: document.getElementById("fab-add"),
                    btnCancel: document.getElementById("btn-cancel"),
                    selectSection: document.getElementById("note-area"),
                    sectionModalOverlay: document.getElementById("section-modal-overlay"),
                    newSectionForm: document.getElementById("new-section-form"),
                    btnNewSection: document.getElementById("btn-new-section"),
                    btnCancelSection: document.getElementById("btn-cancel-section"),
                    btnExport: document.getElementById("btn-export"),
                    btnImportTrigger: document.getElementById("btn-import-trigger"),
                    importFile: document.getElementById("import-file"),
                    confirmModalOverlay: document.getElementById("confirm-modal-overlay"),
                    btnCancelConfirm: document.getElementById("btn-cancel-confirm"),
                    btnDoDelete: document.getElementById("btn-do-delete"),
                };

                // Cargar datos persistidos
                this.loadData();

                // Registrar eventos
                this.bindEvents();

                // Renderizado inicial
                this.render();
            },

            loadData() {
                try {
                    const rawNotes = localStorage.getItem(this.STORAGE_KEYS.NOTES);
                    this.state.notes = rawNotes ? JSON.parse(rawNotes) : [];

                    const rawSections = localStorage.getItem(this.STORAGE_KEYS.SECTIONS);
                    this.state.sections = rawSections ? JSON.parse(rawSections) : [];

                    // Asegurar sección General
                    if (!this.state.sections.some(s => s.id === "general")) {
                        this.state.sections.unshift({
                            id: "general",
                            name: "General",
                            color: "#1DA1F2",
                        });
                    }
                } catch (e) {
                    console.error("Error cargando datos:", e);
                    this.state.notes = [];
                    this.state.sections = [{ id: "general", name: "General", color: "#1DA1F2" }];
                }
            },

            saveData() {
                localStorage.setItem(this.STORAGE_KEYS.NOTES, JSON.stringify(this.state.notes));
                localStorage.setItem(this.STORAGE_KEYS.SECTIONS, JSON.stringify(this.state.sections));
            },

            bindEvents() {
                // Notas
                this.elements.fabAdd.addEventListener("click", () => this.openNoteModal());
                this.elements.btnCancel.addEventListener("click", () => this.closeNoteModal());
                this.elements.newNoteForm.addEventListener("submit", (e) => this.handleNoteSubmit(e));

                // Secciones
                this.elements.btnNewSection.addEventListener("click", () => this.openSectionModal());
                this.elements.btnCancelSection.addEventListener("click", () => this.closeSectionModal());
                this.elements.newSectionForm.addEventListener("submit", (e) => this.handleSectionSubmit(e));

                // Búsqueda
                this.elements.searchInput.addEventListener("input", () => this.renderFeed());

                // Backup
                this.elements.btnExport.addEventListener("click", () => this.exportJSON());
                this.elements.btnImportTrigger.addEventListener("click", () => this.elements.importFile.click());
                this.elements.importFile.addEventListener("change", (e) => this.importJSON(e));

                // Confirmación
                this.elements.btnCancelConfirm.addEventListener("click", () => this.closeConfirmModal());
            },

            // --- Lógica de UI / Renderizado ---

            render() {
                this.renderSidebar();
                this.populateSectionSelect();
                this.renderFeed();
            },

            renderSidebar() {
                this.elements.areaList.innerHTML = "";

                // Opción "Todas"
                const allItem = this.createSidebarItem("Todas", "Todas", null);
                this.elements.areaList.appendChild(allItem);

                // Secciones
                this.state.sections.forEach(section => {
                    const item = this.createSidebarItem(section.name, section.id, section.color);
                    this.elements.areaList.appendChild(item);
                });
            },

            createSidebarItem(name, id, color) {
                const li = document.createElement("li");
                if (this.state.currentFilter === id) li.classList.add("active");

                if (color) {
                    const dot = document.createElement("span");
                    dot.className = "section-color-dot";
                    dot.style.backgroundColor = color;
                    li.appendChild(dot);
                }

                const label = document.createElement("span");
                label.textContent = name;
                li.appendChild(label);

                li.addEventListener("click", () => {
                    this.state.currentFilter = id;
                    this.elements.currentAreaTitle.textContent = id === "Todas" ? "Todas las notas" : name;
                    this.render();
                });

                return li;
            },

            populateSectionSelect() {
                this.elements.selectSection.innerHTML = "";
                this.state.sections.forEach(section => {
                    const opt = document.createElement("option");
                    opt.value = section.id;
                    opt.textContent = section.name;
                    this.elements.selectSection.appendChild(opt);
                });
            },

            renderFeed() {
                this.elements.notesContainer.innerHTML = "";
                const query = this.elements.searchInput.value.toLowerCase().trim();

                let filtered = this.state.notes.filter(note => {
                    const matchesSection = this.state.currentFilter === "Todas" || note.sectionId === this.state.currentFilter;
                    const text = ((note.title || "") + " " + (note.description || "")).toLowerCase();
                    const matchesSearch = text.includes(query);
                    return matchesSection && matchesSearch;
                });

                if (filtered.length === 0) {
                    this.elements.notesContainer.innerHTML = '<p style="padding: 40px; text-align: center; color: #536471;">No se han encontrado notas.</p>';
                    return;
                }

                // Ordenar: fijadas primero, luego cronológicamente
                filtered.sort((a, b) => {
                    if (a.pinned && !b.pinned) return -1;
                    if (!a.pinned && b.pinned) return 1;
                    return (b.timestamp || 0) - (a.timestamp || 0);
                });

                filtered.forEach(note => {
                    const card = this.createNoteCard(note);
                    this.elements.notesContainer.appendChild(card);
                });
            },

            createNoteCard(note) {
                const section = this.state.sections.find(s => s.id === note.sectionId) || { name: "Sin sección", color: "#ccc" };
                const date = note.timestamp ? new Date(note.timestamp).toLocaleString("es-ES", { day: "2-digit", month: "short", hour: "2-digit", minute: "2-digit" }) : "";

                const card = document.createElement("article");
                card.className = "note-card";
                if (note.pinned) card.classList.add("pinned");
                card.style.borderColor = section.color;

                const descriptionHtml = this.linkify(note.description || "");
                const pinText = note.pinned ? "Quitar fija" : "Fijar";
                const pinIcon = note.pinned ? "📌" : "📍";

                card.innerHTML = `
            <div class="note-header">
                <div>
                    <span class="note-area-tag" style="background-color:${section.color};">${this.escapeHtml(section.name)}</span>
                </div>
                <span class="note-date">${this.escapeHtml(date)}</span>
            </div>
            <h3 class="note-title" style="margin-top: 10px;">${this.escapeHtml(note.title || "")}</h3>
            <p class="note-desc">${descriptionHtml}</p>
            <div class="note-meta-row">
                <div>${note.pinned ? '<span class="pin-badge">📌 Nota fijada</span>' : ""}</div>
                <div class="note-actions">
                    <button type="button" data-action="pin" data-id="${note.id}">${pinIcon} ${pinText}</button>
                    <button type="button" data-action="edit" data-id="${note.id}">✏️ Editar</button>
                    <button type="button" class="delete-btn" data-action="delete" data-id="${note.id}">🗑️ Borrar</button>
                </div>
            </div>
        `;

                // Añadir event listeners a los botones de la tarjeta
                card.querySelectorAll("button").forEach(btn => {
                    btn.addEventListener("click", (e) => {
                        const action = e.currentTarget.dataset.action;
                        const id = e.currentTarget.dataset.id;
                        this.handleNoteAction(action, id);
                    });
                });

                return card;
            },

            // --- Handlers de Acciones ---

            handleNoteAction(action, id) {
                console.log(`Acción: ${action} sobre ID: ${id}`);

                switch (action) {
                    case "delete":
                        this.askDeleteNote(id);
                        break;
                    case "edit":
                        this.openEditModal(id);
                        break;
                    case "pin":
                        this.togglePin(id);
                        break;
                }
            },

            askDeleteNote(id) {
                this.state.idToDelete = id;
                this.elements.confirmModalOverlay.classList.remove("hidden");

                // Sobrescribimos el evento 'onclick' en lugar de clonar el nodo del DOM.
                // Esto asegura que solo se ejecute un borrado a la vez de forma limpia.
                this.elements.btnDoDelete.onclick = () => {
                    if (this.state.idToDelete) {
                        this.deleteNote(this.state.idToDelete);
                        this.closeConfirmModal();
                    }
                };
            },

            closeConfirmModal() {
                this.elements.confirmModalOverlay.classList.add("hidden");
                this.state.idToDelete = null;
            },

            deleteNote(id) {
                console.log("Borrando nota con ID:", id);
                const initialCount = this.state.notes.length;

                // Comparación robusta usando strings
                this.state.notes = this.state.notes.filter(n => String(n.id) !== String(id));

                if (this.state.notes.length === initialCount) {
                    console.error("No se encontró la nota para borrar. IDs en estado:", this.state.notes.map(n => n.id));
                } else {
                    console.log("Nota borrada exitosamente.");
                }

                this.saveData();
                this.renderFeed();
            },

            togglePin(id) {
                const note = this.state.notes.find(n => String(n.id) === String(id));
                if (note) {
                    note.pinned = !note.pinned;
                    this.saveData();
                    this.renderFeed();
                }
            },

            // --- Modales ---

            openNoteModal(id = null) {
                this.state.editingNoteId = id;
                const titleEl = this.elements.modalOverlay.querySelector("h3");

                if (id) {
                    const note = this.state.notes.find(n => String(n.id) === String(id));
                    if (!note) return;
                    titleEl.textContent = "Editar Nota";
                    document.getElementById("note-title").value = note.title;
                    document.getElementById("note-desc").value = note.description;
                    this.elements.selectSection.value = note.sectionId;
                } else {
                    titleEl.textContent = "Nueva Nota";
                    this.elements.newNoteForm.reset();
                    if (this.state.currentFilter !== "Todas") {
                        this.elements.selectSection.value = this.state.currentFilter;
                    }
                }
                this.elements.modalOverlay.classList.remove("hidden");
            },

            openEditModal(id) {
                this.openNoteModal(id);
            },

            closeNoteModal() {
                this.elements.modalOverlay.classList.add("hidden");
                this.state.editingNoteId = null;
            },

            handleNoteSubmit(e) {
                e.preventDefault();
                const title = document.getElementById("note-title").value.trim();
                const description = document.getElementById("note-desc").value.trim();
                const sectionId = this.elements.selectSection.value;
                const now = Date.now();

                if (this.state.editingNoteId) {
                    const idx = this.state.notes.findIndex(n => String(n.id) === String(this.state.editingNoteId));
                    if (idx !== -1) {
                        this.state.notes[idx] = { ...this.state.notes[idx], title, description, sectionId, timestamp: now };
                    }
                } else {
                    this.state.notes.push({ id: now, title, description, sectionId, timestamp: now, pinned: false });
                }

                this.saveData();
                this.closeNoteModal();
                this.renderFeed();
            },

            openSectionModal() {
                this.elements.newSectionForm.reset();
                document.getElementById("section-color").value = "#22c55e";
                this.elements.sectionModalOverlay.classList.remove("hidden");
            },

            closeSectionModal() {
                this.elements.sectionModalOverlay.classList.add("hidden");
            },

            handleSectionSubmit(e) {
                e.preventDefault();
                const name = document.getElementById("section-name").value.trim();
                const color = document.getElementById("section-color").value;

                if (this.state.sections.some(s => s.name.toLowerCase() === name.toLowerCase())) {
                    alert("Ya existe una sección con ese nombre.");
                    return;
                }

                this.state.sections.push({ id: "sec_" + Date.now(), name, color });
                this.saveData();
                this.closeSectionModal();
                this.renderSidebar();
                this.populateSectionSelect();
            },

            // --- Export / Import ---

            exportJSON() {
                const data = {
                    notes: this.state.notes,
                    sections: this.state.sections,
                    version: "1.1",
                    exportedAt: new Date().toISOString()
                };
                const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
                const url = URL.createObjectURL(blob);
                const a = document.createElement("a");
                a.href = url;
                a.download = `notter_backup_${new Date().toISOString().split('T')[0]}.json`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
            },

            importJSON(e) {
                const file = e.target.files[0];
                if (!file) return;

                const reader = new FileReader();
                reader.onload = (event) => {
                    try {
                        const data = JSON.parse(event.target.result);
                        if (!data.notes || !data.sections) throw new Error("Formato inválido");

                        if (confirm("¿Importar datos? Se añadirán las notas y secciones que no existan.")) {
                            const existingNoteIds = new Set(this.state.notes.map(n => String(n.id)));
                            data.notes.forEach(n => {
                                if (!existingNoteIds.has(String(n.id))) this.state.notes.push(n);
                            });

                            const existingSectionIds = new Set(this.state.sections.map(s => String(s.id)));
                            data.sections.forEach(s => {
                                if (!existingSectionIds.has(String(s.id))) this.state.sections.push(s);
                            });

                            this.saveData();
                            this.render();
                            alert("¡Importación completada!");
                        }
                    } catch (err) {
                        alert("Error al importar: " + err.message);
                    }
                };
                reader.readAsText(file);
                e.target.value = "";
            },

            // --- Utilidades ---

            escapeHtml(text) {
                if (!text) return "";
                const div = document.createElement("div");
                div.textContent = String(text);
                return div.innerHTML;
            },

            linkify(text) {
                const escaped = this.escapeHtml(text);
                const urlPattern = /(\bhttps?:\/\/[^\s<]+|\bwww\.[^\s<]+)/gi;
                return escaped.replace(urlPattern, (url) => {
                    let href = url;
                    if (!/^https?:\/\//i.test(href)) href = "https://" + href;
                    return `<a href="${href}" target="_blank" rel="noopener noreferrer">${url}</a>`;
                });
            }
        };

        // Iniciar la app cuando el DOM esté listo
        document.addEventListener("DOMContentLoaded", () => {
            NotterApp.init();
        });
    </script>
</body>

</html>
